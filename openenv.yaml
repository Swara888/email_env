name: email-env
description: Email triage environment with uncertainty and multi-step decision making
version: 0.2.0

entrypoint: my_env:EmailEnv

tasks:
  - id: easy
    description: Detect obvious spam emails
  - id: medium
    description: Classify work-related emails
  - id: hard
    description: Handle ambiguous and phishing emails

actions:
  type: object
  properties:
    label:
      type: string
      enum: [spam, important, ignore, reply, urgent]

observations:
  type: object
  properties:
    email:
      type: string

rewards:
  type: float
  minimum: 0.0
  maximum: 1.0
